name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Cache npm downloads
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - name: Unit and component tests
        id: unit_tests
        continue-on-error: true
        run: npm run test -- --reporter=json --outputFile=vitest-results.json
      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-results
          path: vitest-results.json
          if-no-files-found: error
      - run: npm run build
      - name: Package exact deployment source
        run: git ls-files -z | tar --null -T - -czf deployment-source.tgz
      - name: Upload deployment source
        uses: actions/upload-artifact@v4
        with:
          name: deployment-source-${{ github.sha }}
          path: deployment-source.tgz
          if-no-files-found: error
      - run: npx playwright install --with-deps webkit
      - run: npm run test:e2e
      - name: Upload Playwright evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-evidence
          path: test-results
          if-no-files-found: ignore
      - name: Enforce unit-test result
        if: always() && steps.unit_tests.outcome == 'failure'
        run: exit 1
